version: 2

project_name: shito

before:
  hooks:
    - go mod tidy

builds:
  - id: shito
    main: .
    binary: shito
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: shito
    ids:
      - shito
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

changelog:
  use: github
